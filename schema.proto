syntax = "proto3";

package showcase;

option java_package = "com.showcase.proto";
option java_outer_classname = "ShowcaseProto";

message User {
  int32 id = 1;
  string name = 2;
  string email = 3;
  repeated string roles = 4;
}

message Product {
  int32 id = 1;
  string name = 2;
  double price = 3;
  bool in_stock = 4;
}

message GetUserRequest {
  int32 user_id = 1;
}

message GetUserResponse {
  User user = 1;
  bool success = 2;
}

service UserService {
  rpc GetUser (GetUserRequest) returns (GetUserResponse);
}
